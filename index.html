<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo 3 — Prática em Sistemas de Apoio à Fiscalização | SFC/GPF · ANTAQ</title>
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="Imagens/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="Imagens/favicon-16.png"/>
  <link rel="apple-touch-icon" href="Imagens/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1f2937 0%, #0f172a 55%);
      color: #e5e7eb;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      padding-bottom: 80px;
    }

    .stage {
      width: min(96vw, calc(96vh * 16 / 9));
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      border: 1px solid #334155;
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 1920px;
      height: 1080px;
      border: 0;
      background: #fff;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    /* Navigation bar */
    .nav-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      background: rgba(12, 50, 111, 0.95); backdrop-filter: blur(12px);
      padding: 8px 16px; border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      font-family: 'Roboto', sans-serif;
      max-width: 94vw;
    }
    .nav-bar button {
      background: none; border: none; color: white; cursor: pointer;
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background 0.2s; flex-shrink: 0;
    }
    .nav-bar button:hover { background: rgba(255,255,255,0.2); }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }
    .nav-bar button:disabled:hover { background: none; }
    .nav-bar .page-info {
      color: white; font-size: 13px; font-weight: 500;
      min-width: 64px; text-align: center; flex-shrink: 0;
    }
    .nav-bar .home-btn { font-size: 12px; }

    /* Slide dots */
    .nav-dots {
      display: flex; gap: 3px; align-items: center;
      margin: 0 6px; flex-wrap: nowrap; overflow: hidden;
    }
    .nav-dots button {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.3); border: none;
      cursor: pointer; padding: 0; transition: all 0.2s; flex-shrink: 0;
    }
    .nav-dots button.active {
      background: #ffdf00; width: 20px; border-radius: 4px;
    }
    .nav-dots button:hover:not(.active) { background: rgba(255,255,255,0.6); }

    /* Module legend on the dots */
    .nav-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.25); margin: 0 4px; flex-shrink: 0; }

    /* Fullscreen button */
    .fs-btn {
      position: fixed; top: 16px; right: 16px;
      background: rgba(12, 50, 111, 0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: white; cursor: pointer;
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; z-index: 1000; transition: all 0.2s;
    }
    .fs-btn:hover { background: rgba(12, 50, 111, 1); }

    /* Title chip */
    .title-chip {
      position: fixed; top: 16px; left: 16px;
      background: rgba(12, 50, 111, 0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #cbd5e1; padding: 8px 16px; border-radius: 10px;
      font-size: 12px; z-index: 1000; max-width: 60vw;
      display: flex; align-items: center; gap: 10px;
    }
    .title-chip b { color: #ffdf00; font-weight: 700; }
    .title-chip .mod { color: #93c5fd; font-weight: 500; }
  </style>
</head>
<body>
  <div class="title-chip">
    <i class="fa-solid fa-laptop-code"></i>
    <span><b>Módulo 3</b> — Prática em Sistemas de Apoio à Fiscalização &nbsp;·&nbsp; <span class="mod" id="modLabel">Abertura</span></span>
  </div>

  <div class="app">
    <div class="stage">
      <iframe id="slideFrame" title="Slide"></iframe>
      <div id="clickLeft" style="position:absolute;top:0;left:0;width:15%;height:100%;z-index:10;cursor:pointer;"></div>
      <div id="clickRight" style="position:absolute;top:0;right:0;width:15%;height:100%;z-index:10;cursor:pointer;"></div>
    </div>
  </div>

  <div class="nav-bar">
    <button onclick="goHome()" class="home-btn" title="Ir para o início"><i class="fa-solid fa-house"></i></button>
    <button onclick="prev()" id="btnPrev" title="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="nav-dots" id="navDots"></div>
    <button onclick="next()" id="btnNext" title="Próximo"><i class="fa-solid fa-chevron-right"></i></button>
    <span class="page-info" id="pageInfo">1 / 33</span>
  </div>

  <button class="fs-btn" onclick="toggleFullscreen()" title="Tela Cheia (F)"><i class="fa-solid fa-expand" id="fsIcon"></i></button>

  <script>
    const total = 33;
    const frame = document.getElementById('slideFrame');
    let current = 1;

    // Blocos: 1-4 Abertura · 5-16 Legados + Prática SFIS · 17-23 Sistemas GPF
    // 24-26 Externos · 27-30 Ferramentas · 31-33 Fechamento
    function moduleLabel(n) {
      if (n <= 4) return 'Abertura';
      if (n <= 16) return 'Bloco 1 · Legados & Prática SFIS';
      if (n <= 23) return 'Bloco 2 · Sistemas GPF';
      if (n <= 26) return 'Bloco 3 · Externos';
      if (n <= 30) return 'Bloco 4 · Ferramentas';
      return 'Fechamento';
    }

    function fileFor(n) {
      return `slide-${String(n).padStart(2, '0')}.html`;
    }

    function render() {
      frame.src = fileFor(current);
      document.getElementById('pageInfo').textContent = `${current} / ${total}`;
      document.getElementById('btnPrev').disabled = current === 1;
      document.getElementById('btnNext').disabled = current === total;
      document.getElementById('modLabel').textContent = moduleLabel(current);
      updateDots();
    }

    function next() { if (current < total) { current++; render(); } }
    function prev() { if (current > 1) { current--; render(); } }
    function goHome() { current = 1; render(); }

    function updateDots() {
      document.querySelectorAll('.nav-dots button').forEach((dot, i) => {
        dot.classList.toggle('active', i === current - 1);
      });
      const activeDot = document.querySelector('.nav-dots button.active');
      if (activeDot && activeDot.scrollIntoView) activeDot.scrollIntoView({inline:'center', block:'nearest'});
    }

    // Build dots with subtle block separators
    const dotsContainer = document.getElementById('navDots');
    const seps = new Set([4, 16, 23, 26, 30]);
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('button');
      dot.addEventListener('click', () => { current = i + 1; render(); });
      dot.title = `Slide ${i + 1} — ${moduleLabel(i + 1)}`;
      dotsContainer.appendChild(dot);
      if (seps.has(i + 1)) {
        const sep = document.createElement('div');
        sep.className = 'nav-sep';
        dotsContainer.appendChild(sep);
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    function handleKey(key) {
      if (key === 'ArrowRight' || key === ' ' || key === 'PageDown') { next(); }
      else if (key === 'ArrowLeft' || key === 'PageUp') { prev(); }
      else if (key === 'Home') { goHome(); }
      else if (key === 'End') { current = total; render(); }
      else if (key === 'f' || key === 'F') { toggleFullscreen(); }
    }
    document.addEventListener('keydown', (e) => {
      if (['ArrowRight','ArrowLeft','PageDown','PageUp','Home','End',' ','f','F'].indexOf(e.key) !== -1) {
        e.preventDefault();
        handleKey(e.key);
      }
    });
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'slide-nav' && e.data.key) {
        handleKey(e.data.key);
      }
    });

    document.getElementById('clickLeft').addEventListener('click', () => prev());
    document.getElementById('clickRight').addEventListener('click', () => next());

    render();

    const stage = document.querySelector('.stage');
    function scaleFrame() {
      const scale = Math.min(stage.clientWidth / 1920, stage.clientHeight / 1080);
      frame.style.transform = `scale(${scale})`;
    }
    scaleFrame();
    window.addEventListener('resize', scaleFrame);
    new ResizeObserver(scaleFrame).observe(stage);
  </script>
</body>
</html>
